roadmap: vpskit-stability-zh-hardening
created: 2026-06-08

items:
  - slug: runtime-core-contracts
    description: 建立共享运行时、输入菜单、错误码和步骤状态协议，并改造最小 workflow 验证循环退出和异常返回
    depends_on: []
    status: planned
    feature: null
    minimal_loop: true
    produces_contracts:
      - runtime-input-contract
      - runtime-command-contract
      - step-progress-contract
      - error-code-contract
    consumes_contracts: []
    parallel_group: null
    notes: 最小闭环；先证明菜单不死循环、非交互不阻塞、关键失败有返回码

  - slug: remote-exec-wrapper
    description: 抽出远端脚本生成、语言注入、placeholder 替换、上传、执行、清理和超时的统一包装
    depends_on:
      - runtime-core-contracts
    status: planned
    feature: null
    minimal_loop: false
    produces_contracts:
      - remote-exec-contract
    consumes_contracts:
      - runtime-command-contract
      - error-code-contract
    parallel_group: foundation
    notes: 后续 setup/deploy/backup/status/security/settings 都消费这个契约

  - slug: zh-i18n-baseline
    description: 新增中文语言包，设置中文优先默认行为，并完成核心脚本中文文案基线
    depends_on:
      - runtime-core-contracts
    status: planned
    feature: null
    minimal_loop: false
    produces_contracts:
      - zh-language-contract
    consumes_contracts:
      - runtime-input-contract
    parallel_group: foundation
    notes: 可与 remote-exec-wrapper 并行推进

